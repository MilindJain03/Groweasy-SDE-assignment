services:
  # Backend Node.js service
  - type: web
    name: groweasy-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: GEMINI_API_KEY
        sync: false # Set this securely in the Render dashboard

  # Frontend Next.js service
  - type: web
    name: groweasy-frontend
    env: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://groweasy-backend.onrender.com # Render will provide the exact URL
